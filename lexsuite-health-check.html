<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LexSuite Legal Health Check</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "DM Sans", system-ui, sans-serif;
        background: #00162e;
        color: #f7fbff;
        --surface: rgba(1, 24, 46, 0.96);
        --accent: #00d8cc;
        --accent-soft: rgba(0, 216, 204, 0.14);
        --accent-light: rgba(70, 240, 231, 0.18);
        --secondary: #0b2347;
        --text-muted: #c8d8e3;
        --success: #2d6a4f;
        --warning: #b5830a;
        --danger: #8b1a1a;
        --radius: 32px;
        --transition: 240ms ease;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top left,
            rgba(0, 216, 204, 0.14),
            transparent 26%
          ),
          radial-gradient(
            circle at 85% 8%,
            rgba(255, 255, 255, 0.08),
            transparent 14%
          ),
          linear-gradient(180deg, #002050 0%, #0b2347 64%, #00162e 100%);
        color: #f7fbff;
        display: flex;
        justify-content: center;
        padding: 36px 16px 48px;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 1px
        );
        background-size: 24px 24px;
        opacity: 0.14;
        mix-blend-mode: overlay;
      }

      .container {
        width: min(100%, 700px);
        display: grid;
        gap: 28px;
        position: relative;
        z-index: 1;
      }

      .header {
        display: grid;
        gap: 14px;
        text-align: center;
      }

      .brand {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1.1rem, 1.8vw, 1.35rem);
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .brand::after {
        content: "";
        display: block;
        width: 88px;
        height: 1px;
        margin: 12px auto 0;
        background: var(--accent);
        opacity: 0.85;
      }

      .hero-highlight {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px 18px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.92rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2.4rem, 5vw, 3.6rem);
        line-height: 1.04;
        margin: 0;
      }

      .subtitle {
        color: var(--text-muted);
        font-size: 1rem;
        line-height: 1.9;
        max-width: 660px;
        margin: 0 auto;
      }

      .card {
        background: linear-gradient(
          180deg,
          rgba(0, 32, 80, 0.94),
          rgba(11, 35, 71, 0.98)
        );
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-left: 4px solid var(--accent);
        border-radius: var(--radius);
        padding: 34px;
        box-shadow: 0 26px 100px rgba(0, 0, 0, 0.28);
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top right,
          rgba(0, 216, 204, 0.08),
          transparent 24%
        );
        pointer-events: none;
        opacity: 0.38;
      }

      .card::after {
        content: "";
        position: absolute;
        bottom: -28px;
        right: -28px;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: rgba(0, 216, 204, 0.06);
        pointer-events: none;
      }

      .section-divider {
        height: 1px;
        border: none;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 216, 204, 0.55),
          transparent
        );
        margin: 30px 0;
      }

      .grid-2 {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .track-card {
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.02);
        border-radius: 26px;
        padding: 26px;
        cursor: pointer;
        transition:
          transform var(--transition),
          border-color var(--transition),
          background var(--transition),
          box-shadow var(--transition);
        display: grid;
        gap: 14px;
        min-height: 210px;
        position: relative;
      }

      .track-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          140deg,
          rgba(0, 216, 204, 0.04),
          transparent 55%
        );
        opacity: 0;
        transition: opacity var(--transition);
      }

      .track-card:hover,
      .track-card.active {
        transform: translateY(-4px);
        border-color: rgba(0, 216, 204, 0.9);
        background: rgba(0, 216, 204, 0.08);
        box-shadow: 0 22px 58px rgba(0, 0, 0, 0.22);
      }

      .track-card:hover::before,
      .track-card.active::before {
        opacity: 1;
      }

      .track-card h3 {
        margin: 0;
        font-family: "Cormorant Garamond", serif;
        font-size: 1.5rem;
        letter-spacing: 0.02em;
      }

      .track-card p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.85;
      }

      .track-card footer {
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .progress-shell {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: rgba(255, 255, 255, 0.06);
        z-index: 20;
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--accent),
          rgba(70, 240, 231, 0.9)
        );
        transition: width 300ms ease;
      }

      .question-panel {
        display: grid;
        gap: 26px;
      }

      .question-index {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--text-muted);
        letter-spacing: 0.08em;
        font-size: 0.88rem;
        text-transform: uppercase;
      }

      .question-index span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--accent),
          rgba(255, 255, 255, 0.85)
        );
      }

      .question-copy {
        font-size: clamp(1.5rem, 2.3vw, 2.15rem);
        line-height: 1.14;
        margin: 0;
        font-family: "Cormorant Garamond", serif;
      }

      .answer-buttons {
        display: grid;
        gap: 14px;
      }

      .answer-button {
        border: 1px solid rgba(0, 216, 204, 0.55);
        background: rgba(255, 255, 255, 0.04);
        color: #f7fbff;
        border-radius: 999px;
        padding: 18px 22px;
        font-size: 1rem;
        cursor: pointer;
        transition:
          background var(--transition),
          transform var(--transition),
          color var(--transition),
          box-shadow var(--transition);
        text-align: left;
        position: relative;
        overflow: hidden;
      }

      .answer-button::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at center,
          rgba(0, 216, 204, 0.16),
          transparent 40%
        );
        opacity: 0;
        transition: opacity 240ms ease;
      }

      .answer-button:hover::after,
      .answer-button.selected::after {
        opacity: 1;
      }

      .answer-button:hover,
      .answer-button.selected {
        background: var(--accent);
        color: #111118;
        transform: translateY(-1px);
        box-shadow: 0 16px 36px rgba(0, 216, 204, 0.16);
      }

      .pager {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .pager button {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: #f7fbff;
        padding: 14px 20px;
        border-radius: 999px;
        cursor: pointer;
        transition:
          background var(--transition),
          transform var(--transition),
          border-color var(--transition);
      }

      .pager button:hover:not(:disabled) {
        background: rgba(0, 216, 204, 0.14);
        transform: translateY(-1px);
      }

      .pager button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .score-shell {
        display: grid;
        gap: 28px;
        justify-items: center;
        text-align: center;
      }

      .score-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 18px;
        border-radius: 999px;
        font-weight: 700;
        letter-spacing: 0.01em;
        text-transform: uppercase;
      }

      .score-badge.low {
        background: rgba(45, 106, 79, 0.18);
        color: var(--success);
      }

      .score-badge.moderate {
        background: rgba(181, 131, 10, 0.18);
        color: var(--warning);
      }

      .score-badge.high {
        background: rgba(139, 26, 26, 0.18);
        color: var(--danger);
      }

      .score-circle {
        width: min(300px, 100%);
        height: min(300px, 100%);
        position: relative;
      }

      .score-circle svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }

      .score-circle circle {
        fill: none;
        stroke-width: 18;
        stroke-linecap: round;
      }

      .score-circle .track {
        stroke: rgba(255, 255, 255, 0.08);
      }

      .score-circle .progress {
        stroke: var(--accent);
        stroke-dasharray: 440;
        stroke-dashoffset: 440;
        transition: stroke-dashoffset 1.2s ease;
      }

      .score-value {
        position: absolute;
        inset: 0;
        display: grid;
        place-content: center;
        font-size: clamp(3rem, 8vw, 5rem);
        font-weight: 700;
        letter-spacing: -0.05em;
        color: #f7fbff;
      }

      .breakdown {
        display: grid;
        gap: 16px;
        text-align: left;
        width: 100%;
      }

      .breakdown-item {
        display: grid;
        gap: 10px;
        padding: 22px 22px 22px 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.02);
        overflow: hidden;
        position: relative;
      }

      .breakdown-item::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: var(--accent);
        border-radius: 0 8px 8px 0;
      }

      .breakdown-item strong {
        color: #f7fbff;
        display: block;
        font-size: 1rem;
      }

      .breakdown-item span {
        color: var(--text-muted);
        font-size: 0.96rem;
        line-height: 1.75;
      }

      .form-grid {
        display: grid;
        gap: 18px;
      }

      .field-group {
        display: grid;
        gap: 10px;
      }

      .field-group label {
        font-size: 0.9rem;
        color: var(--text-muted);
      }

      .field-group input,
      .field-group select {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: #f7fbff;
        border-radius: 16px;
        padding: 16px 18px;
        font: inherit;
        outline: none;
        transition:
          border-color var(--transition),
          background var(--transition),
          box-shadow var(--transition);
      }

      .field-group input:focus,
      .field-group select:focus {
        border-color: rgba(0, 216, 204, 0.85);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 4px rgba(0, 216, 204, 0.08);
      }

      .submit-button {
        border: none;
        background: var(--accent);
        color: #111118;
        padding: 18px 24px;
        border-radius: 999px;
        font-size: 1rem;
        cursor: pointer;
        transition:
          transform var(--transition),
          filter var(--transition),
          box-shadow var(--transition);
        width: fit-content;
      }

      .submit-button:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
        box-shadow: 0 18px 40px rgba(0, 216, 204, 0.22);
      }

      .confirmation {
        display: grid;
        gap: 18px;
        text-align: center;
      }

      .confirmation p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.8;
      }

      .contact-list {
        display: grid;
        gap: 10px;
        justify-content: center;
      }

      .contact-list a {
        color: var(--accent);
        text-decoration: none;
      }

      .restart-button {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: transparent;
        color: #f7fbff;
        padding: 16px 22px;
        border-radius: 999px;
        cursor: pointer;
        transition:
          background var(--transition),
          transform var(--transition),
          box-shadow var(--transition);
        width: fit-content;
        justify-self: center;
      }

      .restart-button:hover {
        background: rgba(0, 216, 204, 0.12);
        transform: translateY(-1px);
        box-shadow: 0 18px 36px rgba(0, 216, 204, 0.16);
      }

      .page-enter {
        animation: fadeInUp 420ms ease both;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 640px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }

        .card {
          padding: 24px;
        }

        .answer-buttons {
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="progress-shell" aria-hidden="true">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <main class="container" id="app"></main>
    <script>
      const data = {
        tracks: {
          A: {
            label: "General Legal & Compliance Health Check",
            description:
              "A premium diagnostic of CAC registration, corporate governance, NDPA readiness and commercial contracts for Nigerian startups and SMEs.",
            total: 10,
            questions: [
              {
                text: "Is your business registered with the Corporate Affairs Commission (CAC)?",
                consequence:
                  "An unregistered business cannot open a corporate bank account, sign enforceable contracts, or attract legitimate investment.",
              },
              {
                text: "Does your company have a properly structured share capital and allotment?",
                consequence:
                  "Improper share structure causes investor due diligence failures and co-founder disputes with no legal resolution mechanism.",
              },
              {
                text: "Do all founders have a signed Founders Agreement or Shareholders Agreement?",
                consequence:
                  "Without a founders agreement, a departing co-founder can retain equity and paralyse company decisions.",
              },
              {
                text: "Are all intellectual property assets (code, brand, content) formally assigned to the company?",
                consequence:
                  "IP created by founders or contractors before formal assignment legally belongs to the individual, not the company — a deal-killer in due diligence.",
              },
              {
                text: "Does the company have written contracts with all service providers, vendors, and freelancers?",
                consequence:
                  "Verbal agreements are nearly impossible to enforce; undocumented relationships become expensive disputes.",
              },
              {
                text: "Has the company appointed a Data Protection Officer or conducted a NDPA 2023 compliance audit?",
                consequence:
                  "Unregistered data controllers face NDPC enforcement actions including fines and reputational sanctions.",
              },
              {
                text: "Does the company have a Privacy Policy and Terms of Service that comply with NDPA 2023?",
                consequence:
                  "Operating a website or app without a compliant privacy policy is a direct NDPA violation.",
              },
              {
                text: "Has the company filed its annual returns with the CAC this year?",
                consequence:
                  "Failure to file annual returns for two consecutive years triggers CAC strike-off proceedings.",
              },
              {
                text: "Does the company have the required sector-specific licences and permits for its industry?",
                consequence:
                  "Operating without required sector licences exposes the company to regulatory shutdown and personal director liability.",
              },
              {
                text: "Does the company have a Data Processing Agreement with all third-party processors handling customer data?",
                consequence:
                  "Transferring customer data to third parties without a DPA is an NDPA violation with fine exposure per affected data subject.",
              },
            ],
          },
          B: {
            label: "AI Legal Compliance Check",
            description:
              "An AI-specific assessment for Nigerian businesses to benchmark data sourcing, disclosure, liability and governance against NDPA and emerging AI policy risk.",
            total: 15,
            questions: [
              {
                text: "Was the data used to train or fine-tune your AI system sourced with clear copyright clearance or licence?",
                consequence:
                  "Using scraped or unlicensed data for AI training creates copyright infringement liability — the Thomson Reuters ruling (2025) confirmed this is not fair use.",
              },
              {
                text: "Have data subjects whose data is processed by your AI systems given informed consent under NDPA 2023?",
                consequence:
                  "Processing personal data in AI systems without a lawful basis is an NDPA violation attracting fines and enforcement action.",
              },
              {
                text: "Do you disclose to users when decisions affecting them are made by automated AI systems?",
                consequence:
                  "NDPA 2023 gives individuals the right to know about automated decision-making — undisclosed AI decisions are legally challengeable.",
              },
              {
                text: "Has your AI system been audited for algorithmic bias that could discriminate against protected groups?",
                consequence:
                  "Biased AI decisions in credit, hiring, or access create liability for discriminatory outcomes even without discriminatory intent.",
              },
              {
                text: "Does the company have a written policy governing liability for transactions or decisions made by autonomous AI agents?",
                consequence:
                  "When an AI agent makes an erroneous purchase, refund, or commitment, unclear liability policy means the company bears the full loss with no contractual recourse.",
              },
              {
                text: "Does the company have a deepfake and synthetic media policy covering employee likenesses and brand identity?",
                consequence:
                  "Without a policy, synthetic impersonation of executives or brand voice creates both reputational and legal exposure with no prepared response framework.",
              },
              {
                text: "Do your contracts with AI vendors and tool providers include clear liability and data ownership clauses?",
                consequence:
                  "Default AI vendor terms typically assign ownership of your data inputs to the vendor — without negotiated clauses, you may lose rights to your own business data.",
              },
              {
                text: "Are employees informed in writing about any AI-powered monitoring tools used in the workplace?",
                consequence:
                  "Covert employee monitoring via AI tools violates NDPA 2023 transparency requirements and creates wrongful treatment claims.",
              },
              {
                text: "Are IP ownership rights in AI-generated outputs formally assigned to the company in your employment and contractor agreements?",
                consequence:
                  "AI-generated work created by employees or contractors may not automatically belong to the company without explicit IP assignment clauses.",
              },
              {
                text: "Does the company maintain documentation of its AI models including training data sources, model versions, and performance benchmarks?",
                consequence:
                  "Undocumented AI systems cannot be audited, defended in litigation, or submitted to regulators — creating unmanageable liability exposure.",
              },
              {
                text: "Have you reviewed whether your AI tools share customer or employee data with third-party model providers?",
                consequence:
                  "Most AI tools process inputs on external servers — unknowing data transfers to foreign processors may violate NDPA cross-border transfer restrictions.",
              },
              {
                text: "Does the company have an AI incident response plan for failures, biased outputs, or data breaches caused by AI systems?",
                consequence:
                  "Without an incident response plan, an AI failure becomes a crisis with no playbook — maximising both damage and reputational harm.",
              },
              {
                text: "Does the company have a written AI ethics or responsible AI use policy?",
                consequence:
                  "The absence of a responsible AI policy is increasingly a disqualifying gap in investor due diligence and enterprise procurement processes.",
              },
              {
                text: "Has the company assessed compliance with NDPA 2023 Article 32 on automated processing and profiling?",
                consequence:
                  "Automated profiling without a compliant framework exposes the company to individual rights claims and NDPC enforcement.",
              },
              {
                text: "Does the company have a documented AI governance framework approved at board or management level?",
                consequence:
                  "Without board-level AI governance, liability for AI-related harms defaults to individual directors under Nigerian company law.",
              },
            ],
          },
        },
        leadOptions: [
          "CAC/Incorporation",
          "Contracts & Agreements",
          "NDPA Compliance",
          "AI Governance",
          "Investor Readiness",
          "Not sure yet",
        ],
      };

      const state = {
        track: null,
        index: 0,
        answers: [],
      };

      const utils = {
        get root() {
          return document.getElementById("app");
        },
        get progressBar() {
          return document.getElementById("progressBar");
        },
        render(html) {
          this.root.innerHTML = html;
          this.root.querySelector(".card")?.classList.add("page-enter");
        },
        updateProgress(value) {
          this.progressBar.style.width = `${value}%`;
        },
        countUp(target, selector) {
          const element = document.getElementById(selector);
          if (!element) return;
          let current = 0;
          const step = Math.max(1, Math.round((target / 900) * 16));
          const tick = () => {
            current = Math.min(target, current + step);
            element.textContent = `${current}%`;
            if (current < target) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        },
        shake(selector) {
          const node = document.querySelector(selector);
          if (!node) return;
          node.animate(
            [
              { transform: "translateX(0)" },
              { transform: "translateX(-10px)" },
              { transform: "translateX(10px)" },
              { transform: "translateX(0)" },
            ],
            { duration: 260, easing: "ease-in-out" },
          );
        },
      };

      const compute = {
        currentTrack() {
          return data.tracks[state.track];
        },
        progress() {
          const track = this.currentTrack();
          return Math.round((state.index / track.total) * 100);
        },
        score() {
          const track = this.currentTrack();
          const yesCount = state.answers.filter(
            (answer) => answer === "Yes",
          ).length;
          const percent = Math.round((yesCount / track.total) * 100);
          const output = {
            percent,
            tier: "high",
            copy: "You have critical exposure. This needs immediate attention.",
            icon: "✕",
          };
          if (percent >= 80) {
            output.tier = "low";
            output.copy =
              "Your legal foundation is strong. Let's keep it that way.";
            output.icon = "⚖";
          } else if (percent >= 50) {
            output.tier = "moderate";
            output.copy =
              "You have gaps that could cost you at the worst time.";
            output.icon = "⚠";
          }
          return output;
        },
      };

      const render = {
        landing() {
          state.track = null;
          state.index = 0;
          state.answers = [];
          utils.updateProgress(0);
          utils.render(`
            <section class="header">
              <div class="brand">LexSuite Solicitors</div>
              <div class="hero-highlight">Premium legal diagnostics</div>
              <h1 class="title">LexSuite Legal Health Check</h1>
              <p class="subtitle">Know your legal exposure before it costs you. Select the track that best fits your startup or SME and receive a premium compliance assessment.</p>
            </section>
            <div class="card">
              <div class="grid-2">
                ${Object.entries(data.tracks)
                  .map(
                    ([key, track]) => `
                  <button type="button" class="track-card" data-track="${key}" aria-label="Choose ${track.label}">
                    <h3>${track.label}</h3>
                    <p>${track.description}</p>
                    <footer>${track.total} question${track.total > 1 ? "s" : ""}</footer>
                  </button>
                `,
                  )
                  .join("")}
              </div>
            </div>
          `);
          render.attachTrackEvents();
        },
        question() {
          const track = data.tracks[state.track];
          const question = track.questions[state.index];
          const progress = compute.progress();
          utils.updateProgress(progress);
          utils.render(`
            <section class="card question-panel">
              <div class="question-index"><span></span> Question ${state.index + 1} of ${track.total}</div>
              <h2 class="question-copy">${question.text}</h2>
              <div class="answer-buttons">
                ${["Yes", "No", "Not Sure"]
                  .map(
                    (answer) => `
                  <button type="button" class="answer-button" data-answer="${answer}">${answer}</button>
                `,
                  )
                  .join("")}
              </div>
              <div class="pager">
                <button type="button" id="backButton" ${state.index === 0 ? "disabled" : ""}>Back</button>
                <button type="button" id="nextButton">${state.index === track.total - 1 ? "See Your Score" : "Next Question"}</button>
              </div>
            </section>
          `);
          if (state.answers[state.index]) {
            const selected = utils.root.querySelector(
              `.answer-button[data-answer="${state.answers[state.index]}"]`,
            );
            selected?.classList.add("selected");
          }
          render.attachQuestionEvents();
        },
        score() {
          const track = data.tracks[state.track];
          const summary = compute.score();
          const concerns = track.questions
            .map((question, index) => ({
              question,
              answer: state.answers[index],
            }))
            .filter((item) => item.answer !== "Yes");
          utils.updateProgress(100);
          utils.render(`
            <section class="card score-shell">
              <div class="score-badge ${summary.tier}">${summary.icon} ${summary.tier === "low" ? "Low Risk" : summary.tier === "moderate" ? "Moderate Risk" : "High Risk"}</div>
              <div class="score-circle" aria-hidden="true">
                <svg viewBox="0 0 160 160">
                  <circle class="track" cx="80" cy="80" r="70"></circle>
                  <circle class="progress" cx="80" cy="80" r="70"></circle>
                </svg>
                <div class="score-value" id="scoreValue">0%</div>
              </div>
              <p class="tier-copy">${summary.copy}</p>
              <hr class="section-divider" />
              <div class="breakdown">
                <h3 style="font-family: 'Cormorant Garamond', serif; margin:0;">Areas of concern</h3>
                ${concerns
                  .map(
                    (item) => `
                  <div class="breakdown-item">
                    <strong>${item.question.text}</strong>
                    <span>${item.question.consequence}</span>
                  </div>
                `,
                  )
                  .join("")}
              </div>
              <hr class="section-divider" />
              <div class="form-grid">
                ${render.field("name", "Name", "Jane Doe")}
                ${render.field("email", "Email", "hello@company.com", "email")}
                ${render.field("phone", "WhatsApp number", "+234 801 234 5678", "tel")}
                ${render.field("company", "Company name", "Example Ventures")}
                <div class="field-group">
                  <label for="urgent">What's most urgent for you right now?</label>
                  <select id="urgent">
                    ${data.leadOptions.map((option) => `<option value="${option}">${option}</option>`).join("")}
                  </select>
                </div>
                <button type="button" class="submit-button" id="submitForm">Get My Free Audit Call</button>
              </div>
            </section>
          `);
          const circle = document.querySelector(".progress");
          const circumference = 2 * Math.PI * 70;
          const offset =
            circumference - (summary.percent / 100) * circumference;
          requestAnimationFrame(() => {
            if (circle) circle.style.strokeDashoffset = offset;
            utils.countUp(summary.percent, "scoreValue");
          });
          document
            .getElementById("submitForm")
            .addEventListener("click", actions.submitLead);
        },
        confirmation(payload) {
          utils.updateProgress(100);
          utils.render(`
            <section class="card confirmation">
              <div style="display:inline-flex;padding:12px 18px;border-radius:999px;background: rgba(0,216,204,0.15);color: var(--accent);font-weight:700;letter-spacing:0.08em;">Submission received</div>
              <h2 class="title" style="font-size: clamp(2rem, 4vw, 2.8rem);">Thank you, ${payload.name || "Founder"}.</h2>
              <p>Your LexSuite Legal Health Check has been captured. Lukman Asinmi, Esq. will review your diagnostic and reach out through the contact details provided.</p>
              <div class="contact-list">
                <div><strong>Firm:</strong> LexSuite Solicitors</div>
                <div><strong>Website:</strong> <a href="https://juristech.com.ng" target="_blank" rel="noreferrer">juristech.com.ng</a></div>
                <div><strong>Contact:</strong> Lukman Asinmi, Esq.</div>
                <div><strong>LinkedIn:</strong> <a href="#" target="_blank" rel="noreferrer">linkedin.com/company/lexsuite</a></div>
              </div>
              <button type="button" class="restart-button" id="restartButton">Restart assessment</button>
            </section>
          `);
          document
            .getElementById("restartButton")
            .addEventListener("click", actions.restart);
        },
        field(id, label, placeholder, type = "text") {
          return `
            <div class="field-group">
              <label for="${id}">${label}</label>
              <input id="${id}" type="${type}" placeholder="${placeholder}" />
            </div>
          `;
        },
        attachTrackEvents() {
          document.querySelectorAll(".track-card").forEach((card) => {
            card.addEventListener("click", (event) => {
              actions.chooseTrack(event.currentTarget.dataset.track);
            });
          });
        },
        attachQuestionEvents() {
          document.querySelectorAll(".answer-button").forEach((button) => {
            button.addEventListener("click", () =>
              actions.selectAnswer(button.dataset.answer),
            );
          });
          document
            .getElementById("backButton")
            .addEventListener("click", actions.back);
          document
            .getElementById("nextButton")
            .addEventListener("click", actions.next);
        },
      };

      const actions = {
        chooseTrack(trackKey) {
          state.track = trackKey;
          state.index = 0;
          state.answers = new Array(data.tracks[trackKey].total).fill(null);
          render.question();
        },
        selectAnswer(answer) {
          state.answers[state.index] = answer;
          document.querySelectorAll(".answer-button").forEach((button) => {
            button.classList.toggle(
              "selected",
              button.dataset.answer === answer,
            );
          });
        },
        back() {
          if (state.index > 0) {
            state.index -= 1;
            render.question();
          } else {
            render.landing();
          }
        },
        next() {
          if (!state.answers[state.index]) {
            utils.shake(".card");
            return;
          }
          const track = data.tracks[state.track];
          if (state.index < track.total - 1) {
            state.index += 1;
            render.question();
          } else {
            render.score();
          }
        },
        submitLead() {
          const payload = {
            name: document.getElementById("name").value.trim(),
            email: document.getElementById("email").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            company: document.getElementById("company").value.trim(),
            urgency: document.getElementById("urgent").value,
            track: data.tracks[state.track].label,
            score: compute.score(),
          };
          console.log("Lead submission:", payload);
          render.confirmation(payload);
        },
        restart() {
          render.landing();
        },
      };

      document.addEventListener("DOMContentLoaded", () => render.landing());
    </script>
  </body>
</html>
